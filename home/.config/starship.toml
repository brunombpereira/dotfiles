# starship config — managed by ~/.dotfiles

add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$ruby\
$nodejs\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = "git:"
style = "bold yellow"

[git_status]
style = "bold red"

[ruby]
format = "via [ruby $version]($style) "
detect_files = ["Gemfile", ".ruby-version", ".tool-versions"]

[nodejs]
format = "via [node $version]($style) "
detect_files = ["package.json"]
detect_folders = ["node_modules"]

[cmd_duration]
min_time = 500
format = "took [$duration]($style) "

name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck

      - name: Run shellcheck
        run: shellcheck install.sh lib/*.sh scripts/*.sh

  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shfmt
        run: |
          SHFMT_VERSION=v3.8.0
          curl -fsSL -o /tmp/shfmt \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          chmod +x /tmp/shfmt
          sudo mv /tmp/shfmt /usr/local/bin/shfmt

      # Flags mirror .editorconfig + local pre-commit / CONTRIBUTING.md:
      # -bn (binary ops may start a line, matches the repo's leading-pipe style),
      # -i 4 (4-space indent), -ci (indent switch cases).
      - name: Check formatting (shfmt -d)
        run: shfmt -bn -i 4 -ci -d install.sh lib/*.sh scripts/*.sh

  zsh-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zsh

      - name: Parse-check zsh files
        run: |
          set -e
          for f in home/.zshrc home/.zsh/*.zsh; do
            echo "zsh -n $f"
            zsh -n "$f"
          done

  install-parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Smoke test: install.sh and every lib/scripts file must at least parse,
      # and --dry-run should run end-to-end without executing real commands.
      - name: bash -n all shell files
        run: |
          set -e
          for f in install.sh lib/*.sh scripts/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: install.sh --dry-run
        run: ./install.sh --dry-run --no-log --force
